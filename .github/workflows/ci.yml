name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24]
    env:
      POSTGRES_USER: tars
      POSTGRES_PASSWORD: tars
      POSTGRES_DB: tars
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: tars
          POSTGRES_PASSWORD: tars
          POSTGRES_DB: tars
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tars -d tars"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
