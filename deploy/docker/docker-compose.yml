name: tars

# Local dev database: Postgres with the pgvector extension preinstalled.
# Defaults below let `pnpm db:up` work with no .env. Override via deploy/docker/.env
# (copy deploy/docker/.env.example) or shell environment.
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: tars-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tars_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-tars}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - tars_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tars} -d ${POSTGRES_DB:-tars}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tars_pgdata:
